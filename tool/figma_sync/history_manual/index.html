<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulNum History Sync</title>
  <style>
    :root { --bg-top:#0f1020; --bg-bottom:#0a0a14; --surface:#17172a; --text:#fff; --muted:#bfc9de; --line:rgba(88,106,166,.2); --button-dark:#151b34; --button-border:#3a4373; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; display:flex; justify-content:center; padding:32px 20px; font-family:"Zen Maru Gothic","Noto Sans",sans-serif; background:#090a14; color:var(--text);} .phone { width:390px; min-height:844px; background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom)); border-radius:34px; overflow:hidden; border:1px solid rgba(58,67,115,.36); box-shadow:0 28px 70px rgba(0,0,0,.52);} .header { height:92px; padding:22px 20px 14px; display:flex; align-items:flex-end; gap:14px; background:#000;} .back { width:34px; height:34px; border-radius:999px; border:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;} .title { font-size:22px; font-weight:700;} .content { padding:16px; display:flex; flex-direction:column; gap:12px; } .card { background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:16px; } .feature { font-size:16px; font-weight:600; } .time { margin-top:6px; font-size:13px; color:var(--muted); } .load { margin-top:4px; height:48px; border-radius:14px; background:var(--button-dark); border:1px solid var(--button-border); color:var(--text); display:flex; align-items:center; justify-content:center; font-weight:600; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <main class="phone">
    <header class="header"><div class="back">←</div><div class="title">Lịch sử xem</div></header>
    <section class="content">
      <div class="card"><div class="feature">core_numbers</div><div class="time">2026-03-02T19:10:00.000Z</div></div>
      <div class="card"><div class="feature">forecast_day</div><div class="time">2026-03-02T19:22:00.000Z</div></div>
      <div class="card"><div class="feature">psych_matrix</div><div class="time">2026-03-01T20:35:00.000Z</div></div>
      <div class="load">Tải thêm</div>
    </section>
  </main>
</body>
</html>
