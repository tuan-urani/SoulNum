<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulNum Profile Delete Confirm Sync</title>
  <style>
    :root {
      --bg-top:#0f1020; --bg-bottom:#0a0a14; --text:#fff; --muted:#bfc9de;
      --danger:#ef4056; --danger-soft:rgba(239,64,86,.1); --danger-border:rgba(239,64,86,.35);
      --button-dark:#151b34; --button-border:#3a4373;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; justify-content:center; padding:32px 20px; font-family:"Zen Maru Gothic","Noto Sans",sans-serif; background:#090a14; color:var(--text); }
    .phone { width:390px; min-height:844px; background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom)); border-radius:34px; overflow:hidden; border:1px solid rgba(58,67,115,.36); box-shadow:0 28px 70px rgba(0,0,0,.52); }
    .header { height:92px; padding:22px 20px 14px; display:flex; align-items:flex-end; gap:14px; background:#000; }
    .back { width:34px; height:34px; border-radius:999px; border:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; }
    .title { font-size:22px; font-weight:700; }
    .content { padding:16px; }
    .warn { border:1px solid var(--danger-border); border-radius:20px; padding:16px; background:linear-gradient(180deg, rgba(23,27,51,.92), rgba(15,20,39,.92)); }
    .badge { display:inline-flex; padding:6px 10px; border-radius:999px; border:1px solid var(--danger-border); background:var(--danger-soft); color:#ffd5dc; font-size:11px; font-weight:700; margin-bottom:12px; }
    .desc { font-size:14px; line-height:1.5; color:var(--muted); }
    .name { margin-top:12px; font-size:24px; font-weight:700; line-height:1.15; }
    .btn { margin-top:12px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .btn.danger { background:linear-gradient(135deg, #ef4056, #ff6b7f); color:#fff; }
    .btn.secondary { background:var(--button-dark); border:1px solid var(--button-border); color:var(--text); font-weight:600; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <main class="phone">
    <header class="header"><div class="back">←</div><div class="title">Xóa hồ sơ</div></header>
    <section class="content">
      <div class="warn">
        <div class="badge">XÓA VĨNH VIỄN</div>
        <div class="desc">Hồ sơ, lịch sử phân tích, chatbot và dữ liệu liên quan sẽ bị xóa vĩnh viễn.</div>
        <div class="name">Nguyễn Minh Anh</div>
      </div>
      <div class="btn danger">Xác nhận xóa vĩnh viễn</div>
      <div class="btn secondary">Hủy</div>
    </section>
  </main>
</body>
</html>
