<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulNum Profile Detail Sync</title>
  <style>
    :root {
      --bg-top: #0f1020;
      --bg-bottom: #0a0a14;
      --surface: #17172a;
      --border: rgba(88,106,166,.25);
      --text: #fff;
      --muted: #bfc9de;
      --gold: #bba46c;
      --button-dark: #151b34;
      --button-border: #3a4373;
      --danger: #ef4056;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; justify-content:center; padding:32px 20px; font-family:"Zen Maru Gothic","Noto Sans",sans-serif; background:#090a14; color:var(--text); }
    .phone { width:390px; min-height:844px; background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom)); border-radius:34px; overflow:hidden; border:1px solid rgba(58,67,115,.36); box-shadow:0 28px 70px rgba(0,0,0,.52); }
    .header { height:92px; padding:22px 20px 14px; display:flex; align-items:flex-end; gap:14px; background:#000; }
    .back { width:34px; height:34px; border-radius:999px; border:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; }
    .title { font-size:22px; font-weight:700; }
    .content { padding:16px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:16px; }
    .name { font-size:26px; font-weight:700; line-height:1.15; }
    .meta { margin-top:8px; font-size:14px; color:var(--muted); }
    .btn { margin-top:16px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .btn.primary { background: linear-gradient(135deg, var(--gold), #cfb782); color:#111425; }
    .btn.secondary { background: var(--button-dark); border:1px solid var(--button-border); color:var(--text); font-weight:600; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <main class="phone">
    <header class="header">
      <div class="back">←</div>
      <div class="title">Chi tiết hồ sơ</div>
    </header>
    <section class="content">
      <div class="card">
        <div class="name">Nguyễn Minh Anh</div>
        <div class="meta">Ngày sinh (YYYY-MM-DD): 1997-08-12</div>
      </div>
      <div class="btn primary">Chọn làm hồ sơ đang dùng</div>
      <div class="btn secondary">Xóa vĩnh viễn hồ sơ</div>
    </section>
  </main>
</body>
</html>
