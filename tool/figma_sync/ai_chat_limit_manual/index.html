<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulNum AI Chat Limit Sync</title>
  <style>
    :root { --bg-top:#0f1020; --bg-bottom:#0a0a14; --text:#fff; --muted:#bfc9de; --gold:#bba46c; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; display:flex; justify-content:center; padding:32px 20px; font-family:"Zen Maru Gothic","Noto Sans",sans-serif; background:#090a14; color:var(--text);} .phone { width:390px; min-height:844px; background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom)); border-radius:34px; overflow:hidden; border:1px solid rgba(58,67,115,.36); box-shadow:0 28px 70px rgba(0,0,0,.52);} .header { height:92px; padding:22px 20px 14px; display:flex; align-items:flex-end; gap:14px; background:#000;} .back { width:34px; height:34px; border-radius:999px; border:1px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;} .title { font-size:22px; font-weight:700;} .content { min-height:calc(844px - 92px); padding:16px; display:flex; align-items:center; justify-content:center; text-align:center; } .box { max-width:280px; } h2 { margin:0; font-size:24px; font-weight:700; } p { margin:8px 0 0; font-size:14px; line-height:1.45; color:var(--muted); } .btn { margin-top:16px; height:48px; border-radius:14px; background:linear-gradient(135deg, var(--gold), #cfb782); color:#111425; display:flex; align-items:center; justify-content:center; font-weight:700; }
  </style>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <main class="phone"><header class="header"><div class="back">←</div><div class="title">AI Chatbot</div></header><section class="content"><div class="box"><h2>Bạn đã hết lượt chat trong tháng này.</h2><p>Nâng cấp VIP Pro</p><div class="btn">Kích hoạt VIP Pro</div></div></section></main>
</body>
</html>
